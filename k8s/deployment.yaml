apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordle
  labels:
    app: wordle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordle
  template:
    metadata:
      labels:
        app: wordle
    spec:
      containers:
        - name: wordle
          image: ghcr.io/jmelloy/wordle:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/starting-words
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/starting-words
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
